# SUUMO 新着物件バッチ - GitHub Actions ワークフロー
# 毎日 JST 6:00 に実行（UTC 21:00）
name: estate-scorer batch

on:
  schedule:
    - cron: '0 21 * * *'  # UTC 21:00 = JST 6:00
  workflow_dispatch:  # 手動実行用

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # コミット・プッシュに必要
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run batch
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAILS: ${{ secrets.TO_EMAILS }}
        run: |
          python run_batch.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/known_properties.json docs/properties_list.html
          git diff --staged --quiet || git commit -m "chore: update known_properties and properties_list"
          git push
